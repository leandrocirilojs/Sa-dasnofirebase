<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle Saídas MRL</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/svg+xml" href="https://raw.githubusercontent.com/leandrocirilojs/TransporteLMR/3d3e0727935835ee42b9aabbca506cea40d3d2db/favicon.svg">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ba7dff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="MRL Log">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.4/xlsx.full.min.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(reg => console.log('SW registrado:', reg.scope))
          .catch(err => console.log('SW erro:', err));
      });
    }
  </script>

  <style>
    .input-container { position: relative; width: 100%; }
    .input-container input { width: 100%; padding-right: 40px; box-sizing: border-box; }
    .input-container i { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: white; }
    .input-container i:hover { color: #ba7dff; }

    /* Botão flutuante WhatsApp */
    #btn-wpp-flutuante {
      position: fixed; bottom: 80px; right: 16px;
      width: 54px; height: 54px; border-radius: 50%;
      background: linear-gradient(135deg, #7e00ff, #00b5f4);
      border: none; color: white; font-size: 22px;
      cursor: pointer; z-index: 9998;
      box-shadow: 0 4px 20px rgba(126,0,255,0.5);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s; padding: 0;
    }
    #btn-wpp-flutuante:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(126,0,255,0.7); }

    /* Painel WhatsApp flutuante */
    .whatsapp-scheduler-container {
      display: none;
      position: fixed !important;
      bottom: 145px !important; right: 16px !important;
      top: auto !important; left: auto !important;
      width: 300px !important;
      max-width: calc(100vw - 32px) !important;
      z-index: 9997 !important;
    }
    .whatsapp-scheduler-container.aberto { display: block !important; }
  </style>
</head>
<body>

<header class="header">
  <div class="logo">
    <h1><i class="fa-solid fa-dolly" style="color:#ba7dff;"></i> MRL Log</h1>
  </div>
  <div class="menu-toggle" id="mobile-menu">
    <span class="bar"></span>
    <span class="bar"></span>
    <span class="bar"></span>
  </div>
  <nav class="nav" id="nav-links"></nav>
</header>

<!-- Painel WhatsApp (fora do nav, direto no body) -->
<div class="whatsapp-scheduler-container zap">
  <div class="input-container">
    <input type="number" id="whatsapp-scheduler-number" class="whatsapp-scheduler-input" placeholder="Número com DDD">
    <i class="fas fa-microphone" onclick="iniciarReconhecimento()"></i>
  </div>
  <div class="whatsapp-scheduler-message-options">
    <button class="whatsapp-scheduler-message-button" data-message="Boa tarde. Oi,tudo bem? Sou entregador do Tenda">Oi. Entrega Tenda</button>
    <button class="whatsapp-scheduler-message-button" data-message="Poderia me enviar sua localização?">Localização</button>
    <button class="whatsapp-scheduler-message-button" data-message="Estou a caminho da sua entrega. Tenda Delivery.">A caminho</button>
  </div>
  <textarea id="whatsapp-scheduler-message" class="whatsapp-scheduler-textarea" placeholder="Digite a mensagem..." readonly></textarea>
  <button id="whatsapp-scheduler-send" class="whatsapp-scheduler-button">Enviar WhatsApp</button>
</div>

<!-- Botão flutuante -->
<button id="btn-wpp-flutuante" title="WhatsApp Clientes">
  <i class="fab fa-whatsapp"></i>
</button>

<div class="container">
  <h1>Controle de Saídas</h1>
  <form id="expense-form">
    <select id="driver-name" required>
      <option value="" disabled selected>Selecione o Motorista</option>
      <option value="Weverton">Weverton</option>
      <option value="Alexandre">Alexandre</option>
      <option value="Leandro">Leandro</option>
      <option value="Antonio">Antonio Marcos</option>
      <option value="Marcos">Marcos</option>
      <option value="Motorista1">Motorista1</option>
      <option value="Motorista2">Motorista2</option>
      <option value="Flavio">Flavio</option>
      <option value="Henrique">Henrique</option>
      <option value="Alex">Alex</option>
    </select>
    <select id="store-name" required>
      <option value="">Selecione a Loja</option>
      <option value="Tenda Itanhaém">Tenda Itanhaém</option>
      <option value="Tenda Praia Grande">Tenda Praia Grande</option>
      <option value="Krill Cubatão">Krill Cubatão</option>
      <option value="Krill Mongaguá">Krill Mongaguá</option>
      <option value="Krill Praia Grande">Krill Praia Grande</option>
      <option value="Carrefour São Vicente">Carrefour São Vicente</option>
    </select>
    <input type="number" id="expense-amount" placeholder="Valor da Saída" required>
    <input type="number" id="received-amount" placeholder="Valor Recebido" required>
    <input type="number" id="expense-weight" placeholder="Peso (kg)" required>
    <input type="number" id="expense-nfs" placeholder="Qtd NFs:" name="expense-nfs" min="1" value="1" required>
    <input type="date" id="expense-date" required>
    <button type="submit"><i class="fa-solid fa-plus" style="color:#ffffff;"></i> Adicionar Saída</button>
  </form>

  <div class="expense-list">
    <div class="filters">
      <button id="toggle-filters">
        <i class="fa-solid fa-filter" style="color:#ffffff;"></i>
        <span>Exibir Filtros</span>
      </button>
      <div id="filter-section" style="display:none;">
        <input type="date" id="filter-start-date">
        <input type="date" id="filter-end-date">
        <select id="filter-driver">
          <option value="">Selecione o Motorista</option>
          <option value="Weverton">Weverton</option>
          <option value="Alexandre">Alexandre</option>
          <option value="Leandro">Leandro</option>
          <option value="Antonio">Antonio Marcos</option>
          <option value="Marcos">Marcos</option>
          <option value="Motorista1">Motorista1</option>
          <option value="Motorista2">Motorista2</option>
          <option value="Flavio">Flavio</option>
          <option value="Henrique">Henrique</option>
          <option value="Alex">Alex</option>
        </select>
        <select id="filter-store">
          <option value="">Selecione a Loja</option>
          <option value="Tenda Itanhaém">Tenda Itanhaém</option>
          <option value="Tenda Praia Grande">Tenda Praia Grande</option>
          <option value="Krill Cubatão">Krill Cubatão</option>
          <option value="Krill Mongaguá">Krill Mongaguá</option>
          <option value="Krill Praia Grande">Krill Praia Grande</option>
          <option value="Carrefour São Vicente">Carrefour São Vicente</option>
        </select>
      </div>
    </div>

    <div class="total">
      <h2>Pagamento Motorista: R$<span id="total-amount">0.00</span></h2>
      <h2>Lucro Total: R$<span style="color:green;" id="total-profit">0.00</span></h2>
    </div>

    <h2>Saídas</h2>
    <ul id="expenses"></ul>
  </div>

  <div class="action-buttons">
    <button id="export-excel"><i class="fa-solid fa-lg fa-file-excel" style="color:white;"></i> Excel</button>
    <button id="send-whatsapp"><i class="fa-brands fa-lg fa-whatsapp" style="color:white;"></i> WhatsApp</button>
    <button id="download-pdf"><i class="fa-solid fa-lg fa-file-pdf" style="color:white;"></i> PDF</button>
  </div>
</div>

<script>
  // Menu hambúrguer
  document.getElementById('mobile-menu').addEventListener('click', () => {
    document.getElementById('nav-links').classList.toggle('active');
  });

  // Toggle filtros
  document.getElementById('toggle-filters').addEventListener('click', () => {
    const fs = document.getElementById('filter-section');
    const isHidden = fs.style.display === 'none';
    fs.style.display = isHidden ? 'block' : 'none';
    document.querySelector('#toggle-filters span').textContent = isHidden ? 'Ocultar Filtros' : 'Exibir Filtros';
  });

  // Botão flutuante WhatsApp - abre/fecha painel
  const btnWpp = document.getElementById('btn-wpp-flutuante');
  const painelWpp = document.querySelector('.whatsapp-scheduler-container');

  btnWpp.addEventListener('click', (e) => {
    e.stopPropagation();
    const aberto = painelWpp.classList.toggle('aberto');
    btnWpp.innerHTML = aberto ? '<i class="fas fa-times"></i>' : '<i class="fab fa-whatsapp"></i>';
  });

  document.addEventListener('click', (e) => {
    if (painelWpp.classList.contains('aberto') && !painelWpp.contains(e.target) && e.target !== btnWpp) {
      painelWpp.classList.remove('aberto');
      btnWpp.innerHTML = '<i class="fab fa-whatsapp"></i>';
    }
  });

  // Mensagens predefinidas WhatsApp
  document.querySelectorAll('.whatsapp-scheduler-message-button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('whatsapp-scheduler-message').value = btn.getAttribute('data-message');
    });
  });

  // Enviar WhatsApp cliente
  document.getElementById('whatsapp-scheduler-send').addEventListener('click', () => {
    const phone = document.getElementById('whatsapp-scheduler-number').value.trim().replace(/\D/g, '');
    const msg = document.getElementById('whatsapp-scheduler-message').value.trim();
    if (!phone) { alert('Insira o número!'); return; }
    if (!msg) { alert('Selecione uma mensagem!'); return; }
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
  });
</script>

<!-- Firebase + lógica principal (DEVE ser type="module") -->
<script type="module" src="script.js"></script>

<!-- IA de Voz -->
<script src="vozIA.js"></script>

</body>
</html>
